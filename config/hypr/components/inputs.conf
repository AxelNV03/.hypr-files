# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout =  us,latam
    kb_rules =
    kb_variant =
    kb_model =
    kb_options = grp:win_space_toggle
    follow_mouse = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    touchpad {
        natural_scroll = false
        tap-to-click = true    # Añade esto si te gusta tocar el pad para hacer click
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gesturesfalse
gesture = 3, horizontal, workspace
gestures {
    # workspace_swipe = on
    workspace_swipe_invert = true # Prueba primero con 'true', luego con 'false'
}

# gestures {
#     workspace_swipe = true        # Activa el deslizamiento con 3 dedos
#     workspace_swipe_fingers = 3   # Usa 3 dedos
#     workspace_swipe_invert = true # True = Dirección natural (como el celular)
# }

# Example per-device config
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}