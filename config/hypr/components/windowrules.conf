xwayland {
  force_zero_scaling = true
  use_nearest_neighbor = true
}

# # OJO: "override" se coloca después de cada valor que quieras fijar exacto.
windowrule = opacity 0.95 override 0.95 override 0.95 , match:class firefox # Disable blur for firefox
windowrule = opacity 0.95 override 0.95 override 0.95 , match:class brave-browser # Disable blur for firefox

windowrule = opacity 0.85 override 0.85 override 0.85, match:class thunar
windowrule = opacity 0.97 override 0.97 override 0.97, match:class code

windowrule {
  name = bully-fix
  match:class = steam_app_12200

  min_size = 1920 1080
  max_size = 1920 1080     #
  fullscreen_state = 3 3
  allows_input = on
  render_unfocused = on  #
  stay_focused = on       #
  sync_fullscreen = on    #
  immediate = on          #
  size = 1920 1080        #
  keep_aspect_ratio = on  #
}

windowrule = no_blur on, match:class code
windowrule = match:fullscreen on, border_size 0
windowrule = match:fullscreen on, stay_focused on
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.5, match:namespace waybar

# OJO: en layerrules no existe "tag:*". Aquí necesitas matchear por namespace real.
# Si tu layer realmente se llama notif-xxx o notif..., puedes usar regex:
layerrule = ignore_alpha 0.5, match:namespace ^notif.*$

layerrule = blur on, match:namespace logout_dialog

# =========================
# SWAYNC BLUR & XRAY (nuevo)
# =========================
layerrule = blur on, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window

layerrule = ignore_alpha 0.5, match:namespace swaync-control-center
layerrule = ignore_alpha 0.5, match:namespace swaync-notification-window

# ignorezero fue reemplazado por ignore_alpha (con 0.0 equivale a "ignorezero")
layerrule = ignore_alpha 0.0, match:namespace swaync-control-center
layerrule = ignore_alpha 0.0, match:namespace swaync-notification-window

# xray: 0 off, 1 on, unset default
layerrule = xray 0, match:namespace swaync-control-center
layerrule = xray 0, match:namespace swaync-notification-window
